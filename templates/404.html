<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>404 - Page Not Found</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #f8fafc;
			color: #0f172a;
			display: grid;
			place-items: center;
			min-height: 100vh;
		}
		.card {
			text-align: center;
			padding: 2rem;
			border-radius: 12px;
			background: #ffffff;
			box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
			max-width: 420px;
			width: calc(100% - 2rem);
		}
		h1 {
			font-size: 3rem;
			margin: 0 0 0.5rem;
		}
		p {
			margin: 0 0 1.25rem;
			color: #475569;
		}
		a {
			display: inline-block;
			text-decoration: none;
			background: #2563eb;
			color: #fff;
			padding: 0.65rem 1rem;
			border-radius: 8px;
			font-weight: 600;
		}
		a:hover {
			background: #1d4ed8;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>404</h1>
		<p>Sorry, the page you are looking for does not exist.</p>
		<a href="/">Go back home</a>
	</main>
</body>
</html>
