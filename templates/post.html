<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{{ post.title if post else "Post Detail" }}</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 800px;
			margin: 2rem auto;
			padding: 0 1rem;
			line-height: 1.6;
		}
		.meta {
			color: #666;
			font-size: 0.95rem;
			margin-bottom: 1rem;
		}
		.content {
			white-space: pre-wrap;
		}
		a {
			display: inline-block;
			margin-top: 2rem;
			text-decoration: none;
		}
	</style>
</head>
<body>
	{% if post %}
		<article>
			<h1>{{ post.title }}</h1>
			<p class="meta">
				{% if post.author %}By {{ post.author }}{% endif %}
				{% if post.created_at %}
					{% if post.author %} • {% endif %}
					{{ post.created_at }}
				{% endif %}
			</p>
			<div class="content">{{ post.content }}</div>
		</article>
	{% else %}
		<h1>Post not found</h1>
		<p>The requested post could not be loaded.</p>
	{% endif %}

	<a href="/posts">← Back to posts</a>
</body>
</html>
